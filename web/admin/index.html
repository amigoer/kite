<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="__KITE_FAVICON_URL__" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>__KITE_ADMIN_TITLE__</title>
    <style>
      :root {
        color-scheme: light;
        --splash-bg: #ffffff;
        --splash-fg: #0a0a0a;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --splash-bg: #0a0a0a;
          --splash-fg: #fafafa;
        }
      }
      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--splash-bg);
        color: var(--splash-fg);
        z-index: 9999;
        pointer-events: none;
        transition:
          opacity 220ms ease-out,
          visibility 0s linear 220ms;
      }
      #splash.ready {
        opacity: 0;
        visibility: hidden;
      }
      #splash svg {
        width: 32px;
        height: 32px;
        color: var(--splash-fg);
        animation: splash-pulse 1.4s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%,
        100% {
          opacity: 0.35;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.08);
        }
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 32 32"
        fill="currentColor"
      >
        <path d="m16.235 13.059l-4.525 8.516L21.575 30l3.249-12.561z" />
        <path
          d="m12.751 2l-7.81 13.792l5.991 5.113l4.996-8.824l9.158 4.362l1.973-7.629z"
        />
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
