{{template "base.html" .}}

{{define "content"}}
<div class="max-w-6xl mx-auto px-4 py-24 text-center">
    <h1 class="text-5xl font-extrabold text-gray-900 tracking-tight mb-6">
        托管你的媒体，掌控你的数据
    </h1>
    <p class="text-xl text-gray-500 max-w-2xl mx-auto mb-10 leading-relaxed">
        Kite 是一个开源的自部署媒体托管系统。上传图片、视频、音频和文件，即刻获取分享链接。支持本地存储与 S3 兼容后端。
    </p>
    <div class="flex items-center justify-center gap-4">
        <a href="/login" class="px-8 py-3 bg-gray-900 text-white rounded-md font-medium hover:bg-gray-800 transition shadow-sm">
            立即开始
        </a>
        <a href="https://github.com/amigoer/kite" target="_blank" class="px-8 py-3 bg-white text-gray-700 border border-gray-200 rounded-md font-medium hover:bg-gray-50 transition shadow-sm">
            查看源码
        </a>
    </div>

    <!-- Feature Grid -->
    <div class="grid md:grid-cols-3 gap-8 mt-24 text-left">
        <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
            <div class="w-12 h-12 bg-gray-100 text-gray-900 rounded-lg flex items-center justify-center mb-4">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">图片优化</h3>
            <p class="text-gray-500">上传图片自动压缩优化，生成缩略图，保证快速加载。</p>
        </div>
        <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
            <div class="w-12 h-12 bg-gray-100 text-gray-900 rounded-lg flex items-center justify-center mb-4">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">安全的 API 令牌</h3>
            <p class="text-gray-500">生成独立的 API 令牌，无缝对接 PicGo、ShareX 等第三方工具。</p>
        </div>
        <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
            <div class="w-12 h-12 bg-gray-100 text-gray-900 rounded-lg flex items-center justify-center mb-4">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">多种存储后端</h3>
            <p class="text-gray-500">支持本地存储、AWS S3、Cloudflare R2、MinIO 等 S3 兼容存储。</p>
        </div>
    </div>
</div>
{{end}}
