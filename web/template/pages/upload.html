{{define "upload.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {{template "head_common" .}}
</head>
<body hx-boost="true" class="font-sans antialiased bg-white text-gray-900 min-h-screen flex flex-col">
    {{template "header" .}}

    <main class="flex-1">
        <div class="max-w-3xl mx-auto px-6 py-16 md:py-24">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold tracking-tight">上传文件</h1>
                <p class="mt-3 text-gray-500">拖拽或点击选择文件，上传后即刻获取分享链接。</p>
            </div>

            {{if .GuestUploadEnabled}}
            <div id="dropZone"
                 class="relative border-2 border-dashed border-gray-200 rounded-2xl p-12 text-center cursor-pointer transition hover:border-gray-400 hover:bg-gray-50/50"
                 onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" class="hidden" multiple>
                <div class="mx-auto w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                </div>
                <p class="text-gray-600 font-medium">拖拽文件到此处，或点击选择</p>
                <p class="mt-1 text-sm text-gray-400">支持图片、视频、音频和文档，单文件最大 {{.UploadMaxFileSizeLabel}}</p>
            </div>

            <div id="uploadList" class="mt-6 space-y-3 hidden"></div>
            <div id="resultList" class="mt-6 space-y-4 hidden"></div>

            <!-- Toast container (top-center) -->
            <div id="toastContainer" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col items-center gap-2 pointer-events-none"></div>

            <script>
            (function() {
                var dropZone = document.getElementById('dropZone');
                var fileInput = document.getElementById('fileInput');
                var uploadList = document.getElementById('uploadList');
                var resultList = document.getElementById('resultList');
                var toastContainer = document.getElementById('toastContainer');
                var uploadMaxFileSize = Number({{.UploadMaxFileSizeBytes}});

                window.showToast = function(type, message) {
                    var el = document.createElement('div');
                    var base = 'pointer-events-auto flex items-center gap-2 rounded-lg border px-4 py-2.5 text-sm font-medium shadow-lg backdrop-blur transition-all duration-300 transform opacity-0 -translate-y-2';
                    var scheme = type === 'success'
                        ? 'bg-green-50/95 border-green-200 text-green-800'
                        : 'bg-red-50/95 border-red-200 text-red-800';
                    var icon = type === 'success'
                        ? '<svg class="w-4 h-4 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>'
                        : '<svg class="w-4 h-4 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>';
                    el.className = base + ' ' + scheme;
                    el.innerHTML = icon + '<span>' + message + '</span>';
                    toastContainer.appendChild(el);
                    requestAnimationFrame(function() {
                        el.classList.remove('opacity-0','-translate-y-2');
                    });
                    setTimeout(function() {
                        el.classList.add('opacity-0','-translate-y-2');
                        setTimeout(function() { el.remove(); }, 300);
                    }, 2500);
                };

                ['dragenter','dragover'].forEach(function(e) {
                    dropZone.addEventListener(e, function(ev) { ev.preventDefault(); dropZone.classList.add('border-gray-900','bg-gray-50'); });
                });
                ['dragleave','drop'].forEach(function(e) {
                    dropZone.addEventListener(e, function(ev) { ev.preventDefault(); dropZone.classList.remove('border-gray-900','bg-gray-50'); });
                });
                dropZone.addEventListener('drop', function(e) { if(e.dataTransfer.files.length>0) handleFiles(e.dataTransfer.files); });
                fileInput.addEventListener('change', function() { if(fileInput.files.length>0) handleFiles(fileInput.files); fileInput.value=''; });

                function fmtSize(b) {
                    if (b < 1024) return b + ' B';
                    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
                    if (b < 1073741824) return (b / 1048576).toFixed(2) + ' MB';
                    return (b / 1073741824).toFixed(2) + ' GB';
                }
                function escHtml(s) {
                    var d = document.createElement('div');
                    d.textContent = s == null ? '' : String(s);
                    return d.innerHTML;
                }
                function escAttr(s) {
                    return String(s == null ? '' : s)
                        .replace(/&/g, '&amp;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#39;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                }
                function escJsString(s) {
                    return String(s == null ? '' : s)
                        .replace(/\\/g, '\\\\')
                        .replace(/'/g, "\\'")
                        .replace(/\r/g, '\\r')
                        .replace(/\n/g, '\\n')
                        .replace(/</g, '\\x3C');
                }
                var _typeNames = {
                    'pdf': 'PDF 文档', 'doc': 'Word 文档', 'docx': 'Word 文档', 'docm': 'Word 文档', 'odt': 'ODT 文档', 'rtf': 'RTF 文档', 'pages': 'Pages 文档',
                    'xls': 'Excel 表格', 'xlsx': 'Excel 表格', 'xlsm': 'Excel 表格', 'ods': 'ODS 表格', 'numbers': 'Numbers 表格', 'csv': 'CSV 表格',
                    'ppt': 'PPT 演示', 'pptx': 'PPT 演示', 'pptm': 'PPT 演示', 'odp': 'ODP 演示', 'key': 'Keynote 演示',
                    'txt': '纯文本', 'log': '日志文件', 'ini': 'INI 配置', 'cfg': '配置文件', 'conf': '配置文件', 'env': '环境变量', 'properties': '属性文件',
                    'md': 'Markdown', 'mdx': 'MDX', 'yaml': 'YAML', 'yml': 'YAML', 'json': 'JSON', 'jsonc': 'JSONC', 'json5': 'JSON5',
                    'xml': 'XML', 'xsl': 'XSL', 'toml': 'TOML', 'svg': 'SVG',
                    'html': 'HTML 页面', 'htm': 'HTML 页面', 'css': 'CSS 样式', 'scss': 'SCSS 样式', 'sass': 'Sass 样式', 'less': 'Less 样式',
                    'js': 'JavaScript', 'jsx': 'JSX', 'mjs': 'JavaScript', 'cjs': 'JavaScript', 'ts': 'TypeScript', 'tsx': 'TSX',
                    'vue': 'Vue 文件', 'svelte': 'Svelte 文件',
                    'py': 'Python', 'go': 'Go', 'rs': 'Rust', 'java': 'Java', 'kt': 'Kotlin', 'scala': 'Scala',
                    'c': 'C', 'cpp': 'C++', 'cc': 'C++', 'h': 'C 头文件', 'hpp': 'C++ 头文件', 'cs': 'C#',
                    'rb': 'Ruby', 'php': 'PHP', 'swift': 'Swift', 'dart': 'Dart', 'lua': 'Lua', 'r': 'R',
                    'sh': 'Shell 脚本', 'bash': 'Bash 脚本', 'zsh': 'Zsh 脚本', 'fish': 'Fish 脚本', 'ps1': 'PowerShell 脚本', 'bat': '批处理', 'cmd': '批处理',
                    'sql': 'SQL 文件', 'db': '数据库文件', 'sqlite': 'SQLite 数据库', 'sqlite3': 'SQLite 数据库',
                    'zip': 'ZIP 压缩包', 'rar': 'RAR 压缩包', '7z': '7z 压缩包', 'tar': 'TAR 归档', 'gz': 'GZ 压缩包', 'tgz': 'TGZ 压缩包', 'bz2': 'BZ2 压缩包', 'xz': 'XZ 压缩包',
                    'tar.gz': 'TAR.GZ 压缩包', 'tar.bz2': 'TAR.BZ2 压缩包', 'tar.xz': 'TAR.XZ 压缩包',
                    'ttf': 'TrueType 字体', 'otf': 'OpenType 字体', 'woff': 'WOFF 字体', 'woff2': 'WOFF2 字体',
                    'exe': '可执行文件', 'msi': '安装包', 'dmg': 'DMG 镜像', 'app': '应用程序', 'deb': 'DEB 安装包', 'rpm': 'RPM 安装包', 'apk': 'APK 安装包', 'ipa': 'IPA 安装包', 'jar': 'JAR 包', 'war': 'WAR 包',
                    'psd': 'Photoshop 文件', 'ai': 'Illustrator 文件', 'sketch': 'Sketch 文件', 'fig': 'Figma 文件', 'xd': 'Adobe XD 文件',
                    'epub': 'EPUB 电子书', 'mobi': 'Mobi 电子书', 'azw': 'Kindle 电子书', 'azw3': 'Kindle 电子书',
                    'iso': 'ISO 镜像', 'img': '磁盘映像', 'vmdk': 'VMDK 虚拟盘',
                    'pem': 'PEM 证书', 'crt': '证书文件', 'cer': '证书文件', 'p12': 'PKCS12 证书', 'pfx': 'PFX 证书'
                };
                var _mimeExtMap = {
                    'application/pdf': 'pdf',
                    'application/msword': 'doc',
                    'application/vnd.openxmlformats-officedocument.wordprocessingml.document': 'docx',
                    'application/vnd.ms-excel': 'xls',
                    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': 'xlsx',
                    'application/vnd.ms-powerpoint': 'ppt',
                    'application/vnd.openxmlformats-officedocument.presentationml.presentation': 'pptx',
                    'text/csv': 'csv',
                    'text/markdown': 'md',
                    'text/html': 'html',
                    'text/css': 'css',
                    'application/json': 'json',
                    'application/javascript': 'js',
                    'text/javascript': 'js',
                    'application/typescript': 'ts',
                    'application/xml': 'xml',
                    'text/xml': 'xml',
                    'text/yaml': 'yaml',
                    'application/x-yaml': 'yaml',
                    'application/zip': 'zip',
                    'application/x-rar-compressed': 'rar',
                    'application/gzip': 'gz',
                    'application/x-7z-compressed': '7z',
                    'application/x-tar': 'tar',
                    'application/epub+zip': 'epub',
                    'application/java-archive': 'jar',
                    'font/ttf': 'ttf',
                    'font/otf': 'otf',
                    'font/woff': 'woff',
                    'font/woff2': 'woff2'
                };
                var _compoundExts = ['tar.gz', 'tar.bz2', 'tar.xz'];
                var _iconHues = {
                    image: 278,
                    video: 224,
                    audio: 200,
                    pdf: 0,
                    doc: 216,
                    sheet: 145,
                    slides: 28,
                    archive: 38,
                    code: 248,
                    web: 24,
                    database: 206,
                    key: 150,
                    app: 218,
                    design: 316,
                    book: 171,
                    disk: 226,
                    default: 220
                };

                function inferFileType(mimeType) {
                    var mime = String(mimeType || '').split(';')[0].trim().toLowerCase();
                    if (mime.indexOf('image/') === 0) return 'image';
                    if (mime.indexOf('video/') === 0) return 'video';
                    if (mime.indexOf('audio/') === 0) return 'audio';
                    return 'file';
                }

                function splitFileName(name) {
                    var raw = String(name || '').trim();
                    if (!raw) return { displayName: '未命名文件', badge: '', extLower: '' };

                    var lower = raw.toLowerCase();
                    for (var i = 0; i < _compoundExts.length; i++) {
                        var ext = _compoundExts[i];
                        var suffix = '.' + ext;
                        if (lower.slice(-suffix.length) === suffix) {
                            var display = raw.slice(0, raw.length - suffix.length);
                            if (display) {
                                return { displayName: display, badge: ext.toUpperCase(), extLower: ext };
                            }
                        }
                    }

                    var dot = raw.lastIndexOf('.');
                    if (dot > 0 && dot < raw.length - 1) {
                        return {
                            displayName: raw.slice(0, dot),
                            badge: raw.slice(dot + 1).toUpperCase(),
                            extLower: raw.slice(dot + 1).toLowerCase()
                        };
                    }

                    return { displayName: raw, badge: '', extLower: '' };
                }

                function fallbackBadge(fileType) {
                    if (fileType === 'image') return 'IMG';
                    if (fileType === 'video') return 'VID';
                    if (fileType === 'audio') return 'AUD';
                    return 'FILE';
                }

                function resolveTypeLabel(extLower, mimeType, fileType) {
                    var mime = String(mimeType || '').split(';')[0].trim().toLowerCase();
                    var ext = extLower || _mimeExtMap[mime] || '';
                    if (_typeNames[ext]) return _typeNames[ext];
                    if (ext) return ext.toUpperCase() + ' 文件';
                    if (fileType === 'image') return '图片';
                    if (fileType === 'video') return '视频';
                    if (fileType === 'audio') return '音频';
                    if (mime.indexOf('text/') === 0) return '文本文件';
                    return '文件';
                }

                function resolveIconKind(extLower, fileType, mimeType) {
                    var mime = String(mimeType || '').split(';')[0].trim().toLowerCase();
                    var ext = extLower || _mimeExtMap[mime] || '';

                    if (fileType === 'image') return 'image';
                    if (fileType === 'video') return 'video';
                    if (fileType === 'audio') return 'audio';

                    if (ext === 'pdf') return 'pdf';
                    if (['doc', 'docx', 'docm', 'odt', 'rtf', 'pages', 'txt', 'log', 'ini', 'cfg', 'conf', 'env', 'properties', 'md', 'mdx'].indexOf(ext) >= 0) return 'doc';
                    if (['xls', 'xlsx', 'xlsm', 'ods', 'numbers', 'csv'].indexOf(ext) >= 0) return 'sheet';
                    if (['ppt', 'pptx', 'pptm', 'odp', 'key'].indexOf(ext) >= 0) return 'slides';
                    if (['zip', 'rar', '7z', 'tar', 'gz', 'tgz', 'bz2', 'xz', 'tar.gz', 'tar.bz2', 'tar.xz'].indexOf(ext) >= 0) return 'archive';
                    if (['html', 'htm'].indexOf(ext) >= 0) return 'web';
                    if (['css', 'scss', 'sass', 'less', 'js', 'jsx', 'mjs', 'cjs', 'ts', 'tsx', 'vue', 'svelte', 'yaml', 'yml', 'json', 'jsonc', 'json5', 'xml', 'xsl', 'toml', 'graphql', 'proto', 'py', 'go', 'rs', 'java', 'kt', 'scala', 'c', 'cpp', 'cc', 'h', 'hpp', 'cs', 'rb', 'php', 'swift', 'dart', 'lua', 'r', 'sh', 'bash', 'zsh', 'fish', 'ps1', 'bat', 'cmd'].indexOf(ext) >= 0) return 'code';
                    if (['sql', 'db', 'sqlite', 'sqlite3'].indexOf(ext) >= 0) return 'database';
                    if (['pem', 'crt', 'cer', 'p12', 'pfx'].indexOf(ext) >= 0) return 'key';
                    if (['exe', 'msi', 'dmg', 'app', 'deb', 'rpm', 'apk', 'ipa', 'jar', 'war'].indexOf(ext) >= 0) return 'app';
                    if (['psd', 'ai', 'sketch', 'fig', 'xd'].indexOf(ext) >= 0) return 'design';
                    if (['epub', 'mobi', 'azw', 'azw3'].indexOf(ext) >= 0) return 'book';
                    if (['iso', 'img', 'vmdk'].indexOf(ext) >= 0) return 'disk';

                    if (mime.indexOf('text/') === 0) return 'doc';
                    return 'default';
                }

                function iconTone(kind) {
                    var hue = _iconHues[kind] == null ? _iconHues.default : _iconHues[kind];
                    return {
                        bg: 'hsl(' + hue + ' 65% 96%)',
                        border: 'hsl(' + hue + ' 45% 88%)',
                        fg: 'hsl(' + hue + ' 60% 42%)',
                        chipBg: 'hsl(' + hue + ' 80% 91%)',
                        chipFg: 'hsl(' + hue + ' 65% 32%)'
                    };
                }

                function renderIconSvg(kind, color) {
                    var style = 'style="color:' + color + '"';
                    if (kind === 'sheet') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M5 4.75h14a.75.75 0 0 1 .75.75v13a.75.75 0 0 1-.75.75H5a.75.75 0 0 1-.75-.75v-13A.75.75 0 0 1 5 4.75Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M4.75 10h14.5M9.5 4.75v14.5M14.5 10v9.25"/></svg>';
                    }
                    if (kind === 'slides') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4.75 5.75h14.5v9.5H4.75z"/><path stroke-linecap="round" stroke-linejoin="round" d="M8 19.25h8M10 15.25v4m4-4v4"/><path stroke-linecap="round" stroke-linejoin="round" d="m8.5 9 2.25 1.75L14 8.5"/></svg>';
                    }
                    if (kind === 'archive') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4.75 7.25h14.5v10.5a1.5 1.5 0 0 1-1.5 1.5h-11a1.5 1.5 0 0 1-1.5-1.5V7.25Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 7.25h16.5v-2a1.5 1.5 0 0 0-1.5-1.5h-13.5a1.5 1.5 0 0 0-1.5 1.5v2Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M10 10.5h4M12 10.5v4"/></svg>';
                    }
                    if (kind === 'web') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M4 12h16M12 4a12 12 0 0 1 0 16M12 4a12 12 0 0 0 0 16"/></svg>';
                    }
                    if (kind === 'code') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="m9 8-4 4 4 4M15 8l4 4-4 4M13 5l-2 14"/></svg>';
                    }
                    if (kind === 'database') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><ellipse cx="12" cy="6.5" rx="6.5" ry="2.75"/><path stroke-linecap="round" stroke-linejoin="round" d="M5.5 6.5v5c0 1.52 2.91 2.75 6.5 2.75s6.5-1.23 6.5-2.75v-5"/><path stroke-linecap="round" stroke-linejoin="round" d="M5.5 11.5v5c0 1.52 2.91 2.75 6.5 2.75s6.5-1.23 6.5-2.75v-5"/></svg>';
                    }
                    if (kind === 'key') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M14.5 8.5a4.5 4.5 0 1 0-8.1 2.74L4 13.63V16h2.37l1.13-1.13V13.5h1.37L10 12h1.37l1.53-1.53A4.48 4.48 0 0 0 14.5 8.5Z"/><circle cx="10" cy="8.5" r="1"/></svg>';
                    }
                    if (kind === 'app') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="6" y="6" width="12" height="12" rx="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 2v4M15 2v4M9 18v4M15 18v4M2 9h4M18 9h4M2 15h4M18 15h4"/></svg>';
                    }
                    if (kind === 'design') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4a8 8 0 1 0 0 16h1.25a2.25 2.25 0 0 0 0-4.5H12a1.75 1.75 0 0 1 0-3.5h4.25A3.75 3.75 0 0 0 20 8.25 4.25 4.25 0 0 0 15.75 4H12Z"/><circle cx="7.5" cy="10" r="1"/><circle cx="10.25" cy="7.25" r="1"/><circle cx="13.75" cy="7" r="1"/><circle cx="16.5" cy="9.75" r="1"/></svg>';
                    }
                    if (kind === 'book') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M6.5 5.25h8A2.25 2.25 0 0 1 16.75 7.5v11.25h-8A2.25 2.25 0 0 0 6.5 21V5.25Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M6.5 5.25A2.25 2.25 0 0 0 4.25 7.5v11.25A2.25 2.25 0 0 1 6.5 16.5h10.25"/></svg>';
                    }
                    if (kind === 'disk') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="7.5"/><circle cx="12" cy="12" r="1.75"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v3"/></svg>';
                    }
                    if (kind === 'video') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="4.75" y="6.25" width="10.5" height="11.5" rx="2"/><path stroke-linecap="round" stroke-linejoin="round" d="m15.25 10 4-2.25v8.5l-4-2.25"/><path stroke-linecap="round" stroke-linejoin="round" d="m9.5 10.25 3 1.75-3 1.75v-3.5Z"/></svg>';
                    }
                    if (kind === 'audio') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M14.5 5.5v9.75a2.75 2.75 0 1 1-1.5-2.45V7.25l6-1.5v7.5a2.75 2.75 0 1 1-1.5-2.45V4.75l-3 0.75Z"/></svg>';
                    }
                    if (kind === 'image') {
                        return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="4.75" y="5.25" width="14.5" height="13.5" rx="2"/><circle cx="9" cy="10" r="1.25"/><path stroke-linecap="round" stroke-linejoin="round" d="m6.5 16 3.5-3.5 2.5 2.5 2-2 2.5 3"/></svg>';
                    }
                    return '<svg class="w-7 h-7" ' + style + ' fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 3.75h5.19c.4 0 .78.16 1.06.44l3.56 3.56c.28.28.44.66.44 1.06V18.75A1.5 1.5 0 0 1 16.75 20.25h-8.5a1.5 1.5 0 0 1-1.5-1.5v-13.5a1.5 1.5 0 0 1 1.5-1.5Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M13.25 3.75v4.5h4.5"/></svg>';
                }

                function buildFileIcon(meta, sizeClass) {
                    var tone = iconTone(meta.iconKind);
                    return '<div class="' + sizeClass + ' relative shrink-0 overflow-hidden rounded-xl border flex items-center justify-center" style="background:' + tone.bg + ';border-color:' + tone.border + ';">'
                        + '<div class="absolute inset-0 opacity-40" style="background-image:radial-gradient(circle at 28% 24%, rgba(255,255,255,0.85), transparent 58%);"></div>'
                        + renderIconSvg(meta.iconKind, tone.fg)
                        + (meta.badge ? '<span class="absolute bottom-1.5 right-1.5 rounded px-1.5 py-0.5 font-mono text-[10px] leading-none uppercase" style="background:' + tone.chipBg + ';color:' + tone.chipFg + ';">' + escHtml(meta.badge) + '</span>' : '')
                        + '</div>';
                }

                function getFilePresentation(source) {
                    var rawName = source.original_name || source.name || '未命名文件';
                    var mimeType = source.mime_type || source.mimetype || source.type || '';
                    var fileType = source.file_type || inferFileType(mimeType);
                    var parts = splitFileName(rawName);
                    var extLower = parts.extLower || _mimeExtMap[String(mimeType || '').split(';')[0].trim().toLowerCase()] || '';
                    return {
                        rawName: rawName,
                        displayName: parts.displayName || rawName,
                        badge: parts.badge || (extLower ? extLower.toUpperCase() : fallbackBadge(fileType)),
                        typeLabel: resolveTypeLabel(extLower, mimeType, fileType),
                        iconKind: resolveIconKind(extLower, fileType, mimeType),
                        fileType: fileType,
                        mimeType: mimeType
                    };
                }

                function handleFiles(files) {
                    var accepted = false;
                    Array.from(files).forEach(function(file) {
                        if (uploadMaxFileSize > 0 && file.size > uploadMaxFileSize) {
                            showToast('error', file.name + ' 超过单文件大小上限（' + fmtSize(uploadMaxFileSize) + '）');
                            return;
                        }
                        accepted = true;
                        uploadFile(file);
                    });
                    if (accepted) uploadList.classList.remove('hidden');
                }

                function xhrMessage(xhr) {
                    try {
                        var payload = JSON.parse(xhr.responseText || '{}');
                        if (payload.code === 42900) {
                            return '上传请求过于频繁，请稍后再试';
                        }
                        return payload.message || (payload.data && payload.data.message) || '';
                    } catch (_) {
                        return '';
                    }
                }

                function uploadFile(file) {
                    var id = 'f_' + Math.random().toString(36).slice(2,10);
                    var meta = getFilePresentation({
                        name: file.name,
                        type: file.type
                    });
                    var item = document.createElement('div');
                    item.id = id;
                    item.className = 'flex items-center gap-4 bg-white border border-gray-100 rounded-xl p-4 shadow-sm';
                    item.innerHTML = buildFileIcon(meta, 'w-12 h-12')
                        + '<div class="flex-1 min-w-0"><div class="flex items-center gap-2 min-w-0"><p class="text-sm font-medium text-gray-900 truncate" title="' + escAttr(meta.rawName) + '">' + escHtml(meta.displayName) + '</p>' + (meta.badge ? '<span class="shrink-0 rounded-full bg-gray-100 px-2 py-0.5 font-mono text-[10px] font-semibold uppercase tracking-wider text-gray-500">' + escHtml(meta.badge) + '</span>' : '') + '</div><p class="text-xs text-gray-400 mt-0.5">' + fmtSize(file.size) + ' · ' + escHtml(meta.typeLabel) + '</p>'
                        + '<div class="mt-2 h-1.5 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-gray-900 rounded-full transition-all duration-300" style="width:0%" id="'+id+'_bar"></div></div></div>'
                        + '<span class="text-xs text-gray-400 shrink-0" id="'+id+'_pct">0%</span>';
                    uploadList.appendChild(item);

                    var fd = new FormData(); fd.append('file', file);
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', '/api/v1/public/upload');
                    function setUploadState(progress, label, isError) {
                        var bar = document.getElementById(id + '_bar');
                        var pct = document.getElementById(id + '_pct');
                        if (bar) {
                            bar.style.width = progress + '%';
                            if (isError) {
                                bar.classList.remove('bg-gray-900', 'bg-amber-500', 'animate-pulse');
                                bar.classList.add('bg-red-500');
                            } else {
                                bar.classList.remove('bg-red-500');
                            }
                        }
                        if (pct) pct.textContent = label;
                    }
                    xhr.upload.onprogress = function(e) {
                        if (!e.lengthComputable) return;
                        var p = Math.min(90, Math.round(e.loaded / e.total * 90));
                        setUploadState(p, p + '%', false);
                    };
                    xhr.upload.onload = function() {
                        var bar = document.getElementById(id + '_bar');
                        if (bar) {
                            bar.classList.remove('bg-gray-900');
                            bar.classList.add('bg-amber-500', 'animate-pulse');
                        }
                        setUploadState(95, '处理中', false);
                    };
                    xhr.onload = function() {
                        var bar = document.getElementById(id + '_bar');
                        if (bar) bar.classList.remove('animate-pulse');
                        if(xhr.status===200) {
                            var res=JSON.parse(xhr.responseText);
                            if(res.status&&res.data) {
                                setUploadState(100, '完成', false);
                                document.getElementById(id).remove();
                                if(uploadList.children.length===0) uploadList.classList.add('hidden');
                                showResult(file.name, res.data);
                                showToast('success', '上传成功：' + file.name);
                            } else {
                                setUploadState(100, '失败', true);
                                showToast('error', '上传失败：' + (res.message || file.name));
                            }
                        } else {
                            setUploadState(100, '失败', true);
                            showToast('error', xhrMessage(xhr) || ('上传失败：' + file.name));
                        }
                    };
                    xhr.onerror = function() {
                        var bar = document.getElementById(id + '_bar');
                        if (bar) bar.classList.remove('animate-pulse');
                        setUploadState(100, '失败', true);
                        showToast('error', '网络错误：' + file.name);
                    };
                    xhr.send(fd);
                }

                function showResult(filename, data) {
                    resultList.classList.remove('hidden');
                    var links = data.links || {};
                    var meta = getFilePresentation({
                        original_name: filename,
                        mime_type: data.mimetype,
                        file_type: data.file_type
                    });
                    var card = document.createElement('div');
                    card.className = 'bg-white border border-gray-100 rounded-2xl p-5 shadow-sm';
                    var isImg = meta.fileType === 'image';
                    var preview = isImg
                        ? '<img src="'+escAttr(links.url)+'" class="w-16 h-16 object-cover rounded-lg border border-gray-100 shrink-0" alt="">'
                        : buildFileIcon(meta, 'w-16 h-16');
                    card.innerHTML = '<div class="flex items-center gap-4 mb-4">'+preview
                        + '<div class="min-w-0 flex-1"><div class="flex items-center gap-2 min-w-0"><p class="font-medium text-gray-900 truncate" title="' + escAttr(meta.rawName) + '">' + escHtml(meta.displayName) + '</p>' + (meta.badge ? '<span class="shrink-0 rounded-full bg-gray-100 px-2 py-0.5 font-mono text-[10px] font-semibold uppercase tracking-wider text-gray-500">' + escHtml(meta.badge) + '</span>' : '') + '</div><p class="text-xs text-gray-400 mt-0.5" title="' + escAttr(meta.mimeType || meta.typeLabel) + '">' + fmtSize(data.size) + ' · ' + escHtml(meta.typeLabel) + '</p></div>'
                        + '<div class="ml-auto"><span class="inline-flex items-center gap-1 text-xs font-medium text-green-700 bg-green-50 border border-green-100 rounded-full px-2.5 py-1"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>已上传</span></div></div>'
                        + '<div class="space-y-2">'+lr('短链接',links.url)+lr('源 URL',links.source_url)+lr('Markdown',links.markdown)+lr('HTML',links.html)+lr('BBCode',links.bbcode)+'</div>';
                    resultList.prepend(card);
                }

                function lr(label, val) {
                    if(!val) return '';
                    return '<div class="rounded-lg bg-gray-50 px-3 py-2"><div class="flex items-start gap-2">'
                        + '<span class="w-20 shrink-0 pt-1 text-xs text-gray-400">'+label+'</span>'
                        + '<div data-copy="'+escAttr(val)+'" data-copy-label="'+escAttr(label)+'" onclick="copyValueFromElement(this)" title="点击复制" class="min-w-0 flex-1 overflow-x-auto rounded-md cursor-copy transition hover:bg-gray-100 active:bg-gray-200 [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">'
                        + '<code class="block w-max min-w-full whitespace-nowrap bg-transparent px-2 py-1 text-sm text-gray-700 pointer-events-none">'+escHtml(val)+'</code>'
                        + '</div>'
                        + '<button type="button" data-copy="'+escAttr(val)+'" data-copy-label="'+escAttr(label)+'" onclick="copyText(this, event)" class="text-xs text-gray-400 hover:text-gray-900 transition shrink-0 px-2 py-1 rounded hover:bg-gray-200">复制</button></div></div>';
                }

                function fallbackCopyText(text) {
                    var textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.setAttribute('readonly', 'readonly');
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    textarea.style.pointerEvents = 'none';
                    document.body.appendChild(textarea);
                    textarea.select();
                    textarea.setSelectionRange(0, textarea.value.length);
                    var copied = false;
                    try {
                        copied = document.execCommand('copy');
                    } catch (_) {}
                    document.body.removeChild(textarea);
                    return copied;
                }

                function flashCopyButton(btn) {
                    if (!btn) return;
                    var original = btn.getAttribute('data-original-text') || btn.textContent;
                    btn.setAttribute('data-original-text', original);
                    btn.textContent = '已复制';
                    btn.classList.add('text-green-700', 'bg-green-50');
                    setTimeout(function() {
                        btn.textContent = original;
                        btn.classList.remove('text-green-700', 'bg-green-50');
                    }, 1500);
                }

                function copyValue(text, label, btn) {
                    var content = text || '';
                    var copyLabel = label || '内容';
                    if (!content) {
                        showToast('error', '没有可复制的内容');
                        return;
                    }

                    function onSuccess() {
                        flashCopyButton(btn);
                        showToast('success', copyLabel + '已复制');
                    }

                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(content).then(onSuccess).catch(function() {
                            if (fallbackCopyText(content)) {
                                onSuccess();
                                return;
                            }
                            showToast('error', '复制失败，请手动复制');
                        });
                        return;
                    }

                    if (fallbackCopyText(content)) {
                        onSuccess();
                        return;
                    }
                    showToast('error', '复制失败，请手动复制');
                }

                window.copyValueFromElement = function(el) {
                    copyValue(el.getAttribute('data-copy') || '', el.getAttribute('data-copy-label') || '内容');
                };

                window.copyText = function(btn, ev) {
                    if (ev) ev.stopPropagation();
                    copyValue(btn.getAttribute('data-copy') || '', btn.getAttribute('data-copy-label') || '内容', btn);
                };
            })();
            </script>

            {{else}}
            <div class="border-2 border-dashed border-gray-200 rounded-2xl p-16 text-center">
                <div class="mx-auto w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
                <p class="text-gray-500 font-medium">游客上传未开启</p>
                <p class="mt-2 text-sm text-gray-400">请<a href="/login" hx-boost="false" class="text-gray-900 underline underline-offset-4 hover:text-gray-700">登录</a>后上传文件，或联系管理员开启游客上传。</p>
            </div>
            {{end}}
        </div>
    </main>

    {{template "footer" .}}
</body>
</html>
{{end}}
