{{define "base.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Kite - 自部署媒体托管系统{{end}}</title>
    <meta name="description" content="Kite 是一个开源的自部署媒体托管系统，支持图片、视频、音频和文件的上传与分享。">
    <!-- Tailwind CSS CDN for purely static rendering -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#18181b',
            }
          }
        }
      }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased flex flex-col min-h-screen">
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-gray-900 text-white font-bold">K</div>
                <span class="font-bold text-lg">Kite</span>
            </div>
            <nav class="flex items-center gap-6 text-sm font-medium">
                <a href="/" class="text-gray-900">首页</a>
                <a href="https://github.com/amigoer/kite" target="_blank" class="text-gray-500 hover:text-gray-900 transition">GitHub</a>
                <a href="/login" class="px-4 py-2 bg-gray-900 text-white rounded-md hover:bg-gray-800 transition">登录</a>
            </nav>
        </div>
    </header>

    <main class="flex-1">
        {{block "content" .}}{{end}}
    </main>

    <footer class="bg-white border-t border-gray-200 py-8 mt-12">
        <div class="max-w-6xl mx-auto px-4 text-center text-sm text-gray-500">
            &copy; 2026 Kite. All rights reserved.
        </div>
    </footer>
</body>
</html>
{{end}}
