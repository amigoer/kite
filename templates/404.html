{{ define "404.html" }}

<html lang="zh-CN">
{{ template "head" . }}
<body>

  <main>
    <div class="container">
      <div class="error-page">
        <h1>404</h1>

        <a href="/">返回首页</a>

    </div>
  </main>

  {{ template "footer" . }}

{{ end }}
