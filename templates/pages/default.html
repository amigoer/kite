{{ define "pages/default.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
{{ template "head" . }}
<body class="single">
  {{ template "header" . }}

  <main class="main">
    <article class="post-single">
      <header class="post-header">
        <h1 class="post-title">{{ .Page.Title }}</h1>
      </header>
      <div class="post-content">
        {{ .Page.ContentHTML | safeHTML }}
      </div>
    </article>
  </main>

  {{ template "footer" . }}
</body>
</html>
{{ end }}
