{{ define "head" }}
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .PageTitle }}{{ .PageTitle }} — {{ end }}{{ .SiteName }}</title>
  {{ if .Description }}<meta name="description" content="{{ .Description }}">{{ end }}
  {{ if .Keywords }}<meta name="keywords" content="{{ .Keywords }}">{{ end }}
  {{ if .Favicon }}<link rel="icon" href="{{ .Favicon }}">{{ end }}
  <style>
    /* ===== Kite Default Theme — Flat Design ===== */
    :root {
      --c-bg: #fafafa;
      --c-surface: #ffffff;
      --c-text: #1a1a2e;
      --c-text-secondary: #64748b;
      --c-accent: #2563eb;
      --c-accent-hover: #1d4ed8;
      --c-border: #e2e8f0;
      --c-tag-bg: #f1f5f9;
      --c-tag-text: #475569;
      --c-code-bg: #f8fafc;
      --c-footer-bg: #f1f5f9;
      --font-sans: "Inter", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
      --max-w: 720px;
      --max-w-wide: 960px;
      --radius: 6px;
      --gap: 1.5rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --c-bg: #0f172a;
        --c-surface: #1e293b;
        --c-text: #e2e8f0;
        --c-text-secondary: #94a3b8;
        --c-accent: #60a5fa;
        --c-accent-hover: #93bbfc;
        --c-border: #334155;
        --c-tag-bg: #1e293b;
        --c-tag-text: #94a3b8;
        --c-code-bg: #1e293b;
        --c-footer-bg: #1e293b;
      }
    }

    /* --- 重置 --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.75;
      color: var(--c-text);
      background: var(--c-bg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- 链接 --- */
    a { color: var(--c-accent); text-decoration: none; transition: color .15s; }
    a:hover { color: var(--c-accent-hover); }

    /* --- 容器 --- */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 1.25rem; width: 100%; }
    .container-wide { max-width: var(--max-w-wide); margin: 0 auto; padding: 0 1.25rem; width: 100%; }

    /* --- 站点头部 --- */
    .site-header {
      border-bottom: 1px solid var(--c-border);
      padding: 1rem 0;
    }
    .site-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--c-text);
      letter-spacing: -0.02em;
    }
    .site-logo:hover { color: var(--c-accent); }
    .site-nav { display: flex; gap: 1.25rem; align-items: center; }
    .site-nav a {
      font-size: 0.875rem;
      color: var(--c-text-secondary);
      font-weight: 500;
      transition: color .15s;
    }
    .site-nav a:hover, .site-nav a.active { color: var(--c-accent); }

    /* --- 主内容 --- */
    main { flex: 1; padding: 2rem 0; }

    /* --- 文章卡片 --- */
    .post-list { display: flex; flex-direction: column; gap: var(--gap); }
    .post-card {
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--c-border);
    }
    .post-card:last-child { border-bottom: none; }
    .post-card-title {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.375rem;
    }
    .post-card-title a { color: var(--c-text); }
    .post-card-title a:hover { color: var(--c-accent); }
    .post-card-meta {
      font-size: 0.8125rem;
      color: var(--c-text-secondary);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .post-card-summary {
      font-size: 0.9375rem;
      color: var(--c-text-secondary);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-card-tags { display: flex; gap: 0.375rem; flex-wrap: wrap; margin-top: 0.5rem; }

    /* --- 标签/分类 pill --- */
    .tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.125rem 0.5rem;
      background: var(--c-tag-bg);
      color: var(--c-tag-text);
      border-radius: 999px;
      font-weight: 500;
      transition: background .15s;
    }
    .tag:hover { background: var(--c-border); color: var(--c-text); }
    .category-badge {
      font-size: 0.75rem;
      color: var(--c-accent);
      font-weight: 600;
    }

    /* --- 文章详情 --- */
    .post-header { margin-bottom: 2rem; }
    .post-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .post-meta {
      font-size: 0.875rem;
      color: var(--c-text-secondary);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* --- 文章正文 Markdown 排版 --- */
    .post-content { font-size: 1rem; line-height: 1.8; }
    .post-content h1, .post-content h2, .post-content h3,
    .post-content h4, .post-content h5, .post-content h6 {
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      line-height: 1.3;
      font-weight: 600;
    }
    .post-content h2 { font-size: 1.5rem; border-bottom: 1px solid var(--c-border); padding-bottom: 0.375rem; }
    .post-content h3 { font-size: 1.25rem; }
    .post-content p { margin-bottom: 1rem; }
    .post-content ul, .post-content ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    .post-content li { margin-bottom: 0.25rem; }
    .post-content blockquote {
      border-left: 3px solid var(--c-accent);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      color: var(--c-text-secondary);
      background: var(--c-tag-bg);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .post-content code {
      font-family: var(--font-mono);
      font-size: 0.875em;
      background: var(--c-code-bg);
      padding: 0.125rem 0.375rem;
      border-radius: 3px;
    }
    .post-content pre {
      background: var(--c-code-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 1rem;
      overflow-x: auto;
      margin: 1rem 0;
      font-size: 0.875rem;
      line-height: 1.6;
    }
    .post-content pre code { background: none; padding: 0; }
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      margin: 1rem 0;
    }
    .post-content a { border-bottom: 1px solid var(--c-accent); }
    .post-content a:hover { border-bottom-color: var(--c-accent-hover); }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9375rem;
    }
    .post-content th, .post-content td {
      border: 1px solid var(--c-border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    .post-content th { background: var(--c-tag-bg); font-weight: 600; }
    .post-content hr {
      border: none;
      border-top: 1px solid var(--c-border);
      margin: 2rem 0;
    }

    /* --- 分页 --- */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--c-border);
    }
    .pagination a, .pagination span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2rem;
      height: 2rem;
      padding: 0 0.5rem;
      font-size: 0.875rem;
      border-radius: var(--radius);
      font-weight: 500;
    }
    .pagination a { color: var(--c-text-secondary); }
    .pagination a:hover { background: var(--c-tag-bg); color: var(--c-text); }
    .pagination .current {
      background: var(--c-accent);
      color: #fff;
    }

    /* --- 友情链接 --- */
    .friend-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .friend-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      transition: border-color .15s;
    }
    .friend-card:hover { border-color: var(--c-accent); }
    .friend-card img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .friend-card-info h3 { font-size: 0.9375rem; font-weight: 600; line-height: 1.3; }
    .friend-card-info p {
      font-size: 0.8125rem;
      color: var(--c-text-secondary);
      margin-top: 0.125rem;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* --- 归档页 --- */
    .archive-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .archive-count {
      font-size: 0.875rem;
      color: var(--c-text-secondary);
      font-weight: 400;
    }

    /* --- 独立页面 --- */
    .page-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    /* --- 页脚 --- */
    .site-footer {
      border-top: 1px solid var(--c-border);
      padding: 1.5rem 0;
      font-size: 0.8125rem;
      color: var(--c-text-secondary);
      background: var(--c-footer-bg);
    }
    .site-footer .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* --- 404 --- */
    .error-page {
      text-align: center;
      padding: 4rem 1rem;
    }
    .error-page h1 {
      font-size: 4rem;
      font-weight: 800;
      color: var(--c-border);
      letter-spacing: -0.04em;
    }
    .error-page p {
      font-size: 1.125rem;
      color: var(--c-text-secondary);
      margin-top: 0.5rem;
    }
    .error-page a {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1.25rem;
      background: var(--c-accent);
      color: #fff;
      border-radius: var(--radius);
      font-weight: 500;
      font-size: 0.875rem;
    }
    .error-page a:hover { background: var(--c-accent-hover); color: #fff; }

    /* --- 响应式 --- */
    @media (max-width: 640px) {
      .post-title { font-size: 1.5rem; }
      .page-title { font-size: 1.5rem; }
      .post-card-title { font-size: 1.125rem; }
      .site-footer .container { flex-direction: column; text-align: center; }
      .friend-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
{{ end }}
