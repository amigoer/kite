{{ define "index.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
{{ template "head" . }}
<body>
  {{ template "header" . }}

  <main>
    <div class="container">
      {{ if .Posts }}
        <div class="post-list">
          {{ range .Posts }}
            {{ template "post_card" . }}
          {{ end }}
        </div>
        {{ template "pagination" .Pagination }}
      {{ else }}
        <p style="text-align:center;color:var(--c-text-secondary);padding:3rem 0;">暂无文章</p>
      {{ end }}
    </div>
  </main>

  {{ template "footer" . }}
</body>
</html>
{{ end }}
