# Kite Blog 配置文件示例
# 复制本文件为 kite.yaml 并根据实际情况修改
# 也可以通过首次运行引导自动生成

# 渲染模式：classic（SSR + API）或 headless（仅 API）
render_mode: classic

# 数据库配置
database:
  driver: sqlite       # sqlite 或 postgres
  path: kite.db        # SQLite 数据库文件路径

  # PostgreSQL 配置（driver 为 postgres 时使用）
  # host: 127.0.0.1
  # port: 5432
  # user: kite
  # password: your_password
  # name: kite_blog
  # ssl_mode: disable

# 管理员配置
admin:
  enabled: true
  username: admin
  password_hash: ""              # bcrypt 哈希，首次运行引导自动生成
  session_secret: ""             # 会话签名密钥，首次运行引导自动生成
  session_ttl_hours: 168         # 会话有效期（小时），默认 7 天
  profile:
    display_name: ""
    email: ""
    bio: ""
    avatar: ""
    website: ""
    location: ""

# 站点设置
site:
  site_name: Kite
  site_url: ""
  description: ""
  keywords: ""
  favicon: ""
  logo: ""
  icp: ""                        # 备案号
  footer: ""                     # 页脚自定义文本

# 文章设置
post:
  posts_per_page: 10
  enable_comment: true
  enable_toc: true
  summary_length: 200
  default_cover_url: ""

# AI 集成设置（可选）
ai:
  enabled: false
  provider: ""                   # openai / deepseek 等
  api_key: ""
  model: ""
  auto_summary: false
  auto_tag: false
